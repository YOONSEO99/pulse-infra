apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-nginx-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pulse-web
  template:
    metadata:
      labels:
        app: pulse-web
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-nginx-service
spec:
  type: LoadBalancer  # ★ AWS가 진짜 인터넷 주소를 만들어 주는 마법
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: pulse-web
