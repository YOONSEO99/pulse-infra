# AnalysisTemplate 구역 찾기
metrics:
- name: success-rate
  successCondition: result[0] < 0  # 🌟 기존 기준이 무엇이든 '0 미만'으로 조작 (무조건 실패하게 만듦)
  provider:
    prometheus:
      address: http://prometheus-operated.monitoring.svc.cluster.local:9090
      query: |
        sum(rate(nginx_http_requests_total{status=~"5.*"}[1m])) # 500 에러 체크 쿼리
