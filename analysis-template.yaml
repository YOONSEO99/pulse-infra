apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: pulse-error-rate-check
  namespace: pulse
spec:
  metrics:
  - name: error-count
    interval: 10s
    count: 1
    successCondition: result[0] == -1
    failureLimit: 1
    provider:
      prometheus:
        address: http://prometheus-server.monitoring.svc.cluster.local:80
        query: "sum(delta(pulse_http_requests_total{status=~\"5.*\"}[10s])) or vector(0)"
