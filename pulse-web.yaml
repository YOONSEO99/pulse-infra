apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: pulse-sample-app
  namespace: pulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulse-sample-app
  template:
    metadata:
      labels:
        app: pulse-sample-app
    spec:
      containers:
      - name: pulse-sample-app
        image: yoon327/netnie-mini:v2 # 
        ports:
        - containerPort: 80                      # 🌟 Nginx 순정 포트 80번으로 변경!
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
  strategy:
    canary:
      steps:
      - setWeight: 100                           # 실전 앱이므로 바로 100% 시원하게 배포!

# (상단 Rollout 구역은 그대로 두고, 맨 밑 Service 구역만 아래처럼 바꿉니다!)
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-sample-app-service
  namespace: pulse
spec:
  type: ClusterIP       # 🌟 요금 폭탄인 LoadBalancer를 버리고, 내부 전용(ClusterIP)으로 다이어트!
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: pulse-sample-app
