apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: pulse-sample-app
  namespace: pulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulse-sample-app
  template:
    metadata:
      labels:
        app: pulse-sample-app
    spec:
      containers:
      - name: pulse-sample-app
        image: yoon327/pulse-sample-app:v3 # 대장님의 진짜 든든한 이미지 주소!
        ports:
        - containerPort: 8080
  # -------------------------------------------------------------
  # [교정 완료] 백그라운드 자동 감시단 전략
  # -------------------------------------------------------------
  strategy:
    canary:
      # 🌟 [핵심 수정] steps 안에서 빼서 canary 바로 아래 배치합니다.
      # 이렇게 하면 배포가 시작되자마자 백그라운드에서 실시간 감시단이 알아서 상시 가동됩니다!
      analysis:
        templates:
        - templateName: pulse-error-rate-check
      steps:
      - setWeight: 25
      - pause: {} # 🌟 이제 한 칸에 pause 하나만 깔끔하게 존재하므로 문법 에러가 나지 않습니다!
      - setWeight: 50
      - pause: {duration: 10s}
      - setWeight: 100
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-sample-app-service
  namespace: pulse
spec:
  type: ClusterIP
  ports:
  - port: 8080       
    targetPort: 8080 
  selector:
    app: pulse-sample-app
