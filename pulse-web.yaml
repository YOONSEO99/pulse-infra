apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: pulse-sample-app
  namespace: pulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulse-sample-app
  template:
    metadata:
      labels:
        app: pulse-sample-app
    spec:
      containers:
      - name: pulse-sample-app
        image: yoon327/netnie-mini:v1 # 🌟 대장님의 진짜 이미지 주소로 교체!
        ports:
        - containerPort: 80                      # 🌟 Nginx 순정 포트 80번으로 변경!
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
  strategy:
    canary:
      steps:
      - setWeight: 100                           # 실전 앱이므로 바로 100% 시원하게 배포!
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-sample-app-service
  namespace: pulse
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80                               # 🌟 서비스 구멍도 80번으로 일치!
  selector:
    app: pulse-sample-app
