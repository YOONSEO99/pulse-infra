apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: pulse-sample-app
  namespace: default  # 🌟 EKS 기본 방인 default로 주파수를 맞춥니다.
spec:
  replicas: 1         # 🌟 프리티어 슬롯 방어선!
  selector:
    matchLabels:
      app: pulse-sample-app
  template:
    metadata:
      labels:
        app: pulse-sample-app
    spec:
      containers:
      - name: pulse-sample-app
        image: yoon327/pulse-sample-app:v3
        ports:
        - containerPort: 8080
        resources:    # 🌟 아기 서버들을 위한 최소한의 영양실조 방지 세팅
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
  # -------------------------------------------------------------
  # 🚀 프로메테우스 없이 순수 카나리 스텝만 밟기
  # -------------------------------------------------------------
  strategy:
    canary:
      steps:          # 🌟 analysis 부분을 과감히 삭제하고 steps로 바로 진입!
      - setWeight: 25
      - pause: {}     # 멈춰서 대장님이 수동으로 배포 진행시킬 때까지 대기하는 구간!
      - setWeight: 50
      - pause: {duration: 10s}
      - setWeight: 100
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-sample-app-service
  namespace: default
spec:
  type: LoadBalancer # 🌐 Nginx처럼 진짜 인터넷 주소 뽑아내기!
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: pulse-web
