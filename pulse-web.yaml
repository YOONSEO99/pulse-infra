apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: pulse-web-server
  namespace: pulse
spec:
  replicas: 4
  selector:
    matchLabels:
      app: pulse-web
  template:
    metadata:
      labels:
        app: pulse-web
    spec:
      containers:
      - name: web-nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
  # -------------------------------------------------------------
  # [★핵심] 카나리 배포 전략 심기
  # -------------------------------------------------------------
  strategy:
    canary:
      steps:
      - setWeight: 25        # 1. 새 버전이 나오면 트래픽의 25%만 먼저 보낸다 (서버 4대 중 1대만 변경)
      - pause: {duration: 1m} # 2. 그 상태로 1분 동안 에러가 나는지 지켜본다 (대기)
      - setWeight: 50        # 3. 문제없으면 트래픽을 50%까지 확대한다
      - pause: {duration: 1m} # 4. 다시 1분 동안 모니터링하며 대기한다
                             # 5. 이후 최종적으로 100% 완전 교체한다!
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-web-service
  namespace: pulse
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: pulse-web