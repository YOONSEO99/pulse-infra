apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: pulse-sample-app
  namespace: pulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulse-sample-app
  template:
    metadata:
      labels:
        app: pulse-sample-app
    spec:
      containers:
      - name: pulse-sample-app
        image: yoon327/netnie-mini:v2
        ports:
        - containerPort: 80
        env:
        - name: TRIGGER_ROLLBACK
          value: "v6.5"  
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
  strategy:
    canary:
      steps:
      - setWeight: 100

---
apiVersion: v1
kind: Service
metadata:
  name: pulse-sample-app-service
  namespace: pulse
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: pulse-sample-app
