apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-web-server
  namespace: pulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pulse-web
  template:
    metadata:
      labels:
        app: pulse-web
    spec:
      containers:
      - name: web-nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-web-service
  namespace: pulse
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: pulse-web